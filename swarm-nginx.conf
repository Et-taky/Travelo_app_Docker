worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Default server — handles healthchecks and unmatched requests
    server {
        listen 80 default_server;
        server_name _;

        # Health endpoint for Docker Swarm healthcheck
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Fallback: return 444 for unmatched requests
        location / {
            return 444;
        }
    }

    # Routing for frontend
    server {
        listen 80;
        server_name frontend.exam.local;

        location / {
            # Use variable to force dynamic DNS resolution at runtime
            set $frontend_upstream http://travelo_frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Routing for backend
    server {
        listen 80;
        server_name backend.exam.local;

        location / {
            # Use variable to force dynamic DNS resolution at runtime
            set $backend_upstream http://travelo_backend:8080;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
