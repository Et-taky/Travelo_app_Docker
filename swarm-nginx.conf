worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Use Docker's embedded DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Define upstream services (must match Swarm service names)
    upstream frontend {
        server travelo_frontend:3000;
    }

    upstream backend {
        server travelo_backend:8080;
    }

    # Routing for frontend
    server {
        listen 80;
        server_name frontend.exam.local;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Routing for backend
    server {
        listen 80;
        server_name backend.exam.local;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
