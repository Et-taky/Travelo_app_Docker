version: "3.9"

services:

  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelo-network

    deploy:
      replicas: 1

      restart_policy:
        condition: on-failure

      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  backend:
    image: taky77/travelo-backend:2.0

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://travelo_database:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

    networks:
      - travelo-network
    
    ports:
      - "8080:8080"

    deploy:
      replicas: 2

      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

      resources:
        limits:
          cpus: "1.0"
          memory: 1G
      

  frontend:
    image: taky77/travelo-frontend:2.0

    ports:
      - "3001:3000"

    networks:
      - travelo-network

    deploy:
      replicas: 2

      restart_policy:
        condition: on-failure

      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        

  nginx:
    image: nginx:1.27

    ports:
      - "80:80"

    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - travelo-network

    deploy:
      replicas: 1

      restart_policy:
        condition: on-failure

      resources:
        limits:
          cpus: "0.25"
          memory: 256M

configs:
  nginx_config:
    file: ./swarm-nginx.conf

networks:
  travelo-network:
    driver: overlay

volumes:
  mysql_data: