version: "3.9"
services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: travelo_db
    secrets:
      - mysql_root_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - travelo-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  travelo_backend:
    image: taky77/travelo-backend:2.2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/travelo_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${env:MYSQL_ROOT_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${env:MYSQL_ROOT_PASSWORD}
    networks:
      - travelo-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 10
        window: 120s
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    ports:
      - "8080:8080"

  travelo_frontend:
    image: taky77/travelo-frontend:2.0
    networks:
      - travelo-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test: ["NONE"]
    ports:
      - "3001:3000"

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - travelo-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

configs:
  nginx_config:
    file: ./swarm-nginx.conf

networks:
  travelo-net:
    driver: overlay

volumes:
  mysql_data:

secrets:
  mysql_root_password:
    external: true